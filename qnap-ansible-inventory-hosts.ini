# Rocky Linux Raspberry Pi Cluster Inventory
# Managed by QNAP TS-473a Ansible Control Machine
# Location: /mnt/ansible-data/rpi-cluster/inventory/hosts.ini

[all:vars]
# Remote user for all nodes (must exist on all nodes)
ansible_user=rocky

# SSH configuration
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_python_interpreter=/usr/bin/python3
ansible_connection=ssh
ansible_port=22
ansible_timeout=30

# Privilege escalation
ansible_become=True
ansible_become_method=sudo
ansible_become_user=root
ansible_become_ask_pass=False

# Connection optimization
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
ansible_pipelining=True
ansible_scp_if_ssh=True

# Fact gathering
gather_facts=True
gather_subset=all

# -------------------------------------------
# MASTER NODES (K3s Control Plane)
# -------------------------------------------

[masters]
rpi-master \
  ansible_host=192.168.1.100 \
  node_type=master \
  cluster_role=control_plane \
  node_index=0

# -------------------------------------------
# WORKER NODES (K3s Agents)
# -------------------------------------------

[workers]
rpi-worker-1 \
  ansible_host=192.168.1.101 \
  node_type=worker \
  cluster_role=agent \
  node_index=1

# rpi-worker-2 \
#   ansible_host=192.168.1.102 \
#   node_type=worker \
#   cluster_role=agent \
#   node_index=2

# rpi-worker-3 \
#   ansible_host=192.168.1.103 \
#   node_type=worker \
#   cluster_role=agent \
#   node_index=3

# -------------------------------------------
# K3S CLUSTER GROUPING
# -------------------------------------------

[k3s_cluster:children]
masters
workers

# -------------------------------------------
# MONITORING NODES
# -------------------------------------------

[monitoring]
rpi-master

# -------------------------------------------
# LOGGING NODES
# -------------------------------------------

[logging]
rpi-master

# -------------------------------------------
# ALL CLUSTER NODES
# -------------------------------------------

[cluster:children]
k3s_cluster

# -------------------------------------------
# INFRASTRUCTURE NODES
# -------------------------------------------

[infrastructure:children]
masters
monitoring
logging
